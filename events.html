<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events — Insurgency Community League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #04295d; --surface: #083a83; --surface-2: #0c4fb3;
      --border: #2a6ac1; --accent: #1c7ed6; --text: #e8f4ff; --muted: #a9c8e7;
    }
    body { font-family: 'Roboto', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 2rem; display: flex; align-items: center; }
    .header-nav { display: flex; align-items: center; gap: 0.25rem; }
    .header-nav a { color: var(--muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 0.4rem; transition: color 0.15s, background 0.15s; }
    .header-nav a:hover { color: var(--text); background: rgba(255,255,255,0.07); }
    .header-nav a.active { color: var(--text); }
    main { max-width: 860px; margin: 2.5rem auto; padding: 0 1.5rem 4rem; }
    h1 { font-size: 1.6rem; margin-bottom: 1.75rem; }
    .badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 9999px; font-size: 0.72rem; font-weight: 600; }
    .badge-pending  { background: #1e3a5f; color: #60a5fa; }
    .badge-underway { background: #14532d; color: #4ade80; }
    .badge-complete { background: #374151; color: #9ca3af; }
    .event-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; margin-bottom: 1rem; }
    .event-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.5rem; }
    .event-meta { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
    .event-type { font-size: 0.8rem; color: var(--muted); }
    #empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
  </style>
</head>
<body>
<header>
  <nav class="header-nav">
    <a href="index.html">Home</a>
    <a href="news.html">News</a>
    <a href="events.html" class="active">Events</a>
    <a href="matches.html">Matches</a>
  </nav>
</header>
<main>
  <h1>Events</h1>
  <div id="events-list"><p id="empty">No events available.</p></div>
</main>
<script>
  function capFirst(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
  function badgeClass(state) {
    return state === 'underway' ? 'badge-underway' : state === 'complete' ? 'badge-complete' : 'badge-pending';
  }

  let events = [];
  try { events = JSON.parse(localStorage.getItem('icl_public_events') || '[]'); } catch {}

  const list = document.getElementById('events-list');
  if (!events.length) return;
  list.innerHTML = events.map(e => `
    <div class="event-card">
      <div class="event-name">${e.name.replace(/</g,'&lt;')}</div>
      <div class="event-meta">
        <span class="badge ${badgeClass(e.state)}">${e.state}</span>
        ${e.type ? `<span class="event-type">${capFirst(e.type).replace(/</g,'&lt;')}</span>` : ''}
      </div>
    </div>`).join('');
</script>
</body>
</html>
