<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Logging you in…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Roboto', system-ui, sans-serif; display: grid; place-items: center; height: 100vh; margin: 0; background: #04295d; color: #e8f4ff; }
    .card { text-align: center; padding: 2rem; }
    .spinner { width: 40px; height: 40px; border: 4px solid #2a6ac1; border-top-color: #1c7ed6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <p id="status">Completing login…</p>
  </div>

  <script type="module">
    import { ChallongeAuth } from './challonge-api.js';

    async function handleCallback() {
      try {
        await ChallongeAuth.handleCallback();
        document.getElementById('status').textContent = 'Login successful! Redirecting…';
        // Send the user back to where they came from, or to the home page
        const returnTo = sessionStorage.getItem('challonge_return_to') ?? '/';
        sessionStorage.removeItem('challonge_return_to');
        setTimeout(() => { window.location.href = returnTo; }, 800);
      } catch (err) {
        document.getElementById('spinner').style.display = 'none';
        const statusEl = document.getElementById('status');
        statusEl.className = 'error';
        statusEl.textContent = `Login failed: ${err.message}`;
        console.error(err);
      }
    }

    handleCallback();
  </script>
</body>
</html>
